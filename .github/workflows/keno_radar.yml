name: Keno Radar

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scraper (fetch latest 15 games)
        run: python scraper.py

      - name: Generate radar GIF and send email
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
        run: python radar.py

      - name: Save GIF to repository
        run: |
          git config --global user.name "KenoBot"
          git config --global user.email "kenobot@users.noreply.github.com"
          git add keno_radar.gif games.csv || true
          git commit -m "Radar generated: $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push || true
